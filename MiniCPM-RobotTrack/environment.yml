name: MiniCPM-RobotTrack
channels:
  - conda-forge
  - aihabitat
dependencies:
  - python=3.9
  - numpy=1.23
  - pip=24.0
  - cmake=3.14
  - ffmpeg=4.4
  - habitat-sim=0.3.1
  - withbullet
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.4.1+cu121
      - torchvision==0.19.1+cu121
      - torchaudio==2.4.1+cu121
      - transformers==4.57.6
      - -e ./third_party/habitat-lab
      - -e .
